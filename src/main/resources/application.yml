spring:
  application:
    name: mcp-codestyle-server
  main:
    web-application-type: none
    banner-mode: off
  ai:
    mcp:
      server:
        name: mcp-codestyle-server
        version: 1.0.0
        type: SYNC
        stdio: true
        annotation-scanner:
          enabled: true

logging:
  level:
    root: OFF
# 仓库配置
repository:
  # 本地基础路径，可通过JVM参数 -Dcache.base-path=自定义路径 覆盖
  # 示例: java -Dcache.base-path=/custom/path -jar app.jar
  local-path: /var/cache/codestyle # 默认本地路径
  remote-path: http://localhost:8080 # 远程仓库地址
  # 仓库目录配置(可选,不配置则自动使用 local-path/codestyle-cache)
  repository-dir: /var/cache/codestyle/codestyle-cache
  # 是否启用远程检索(默认false,使用本地Lucene检索)
  remote-search-enabled: false
  # 远程检索超时时间(毫秒)
  remote-search-timeout-ms: 5000
  # API密钥(可选,如果远程仓库需要身份验证则配置)
  api-key:
  
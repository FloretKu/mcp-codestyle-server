spring:
  application:
    name: mcp-codestyle-server
  main:
    web-application-type: none
    banner-mode: off
  ai:
    mcp:
      server:
        name: mcp-codestyle-server
        version: 2.1.0
        type: SYNC
        stdio: true
        annotation-scanner:
          enabled: true

logging:
  level:
    root: OFF

# 沙盒执行配置（对应 SandboxVerificationService）。
# 优先级：JVM 系统属性 > 环境变量 > 本文件 > 代码默认值。
sandbox:
  mode: ${CODESTYLE_SANDBOX_MODE:local}
  docker:
    image: ${CODESTYLE_SANDBOX_DOCKER_IMAGE:maven:3.9.9-eclipse-temurin-17}
    workdir: ${CODESTYLE_SANDBOX_DOCKER_WORKDIR:/workspace}
    memory: ${CODESTYLE_SANDBOX_DOCKER_MEMORY:1g}
    cpus: ${CODESTYLE_SANDBOX_DOCKER_CPUS:1.0}
    # 默认允许联网，避免首次拉取依赖时直接失败。
    network-none: ${CODESTYLE_SANDBOX_DOCKER_NETWORK_NONE:false}
    # 若路径存在，则将宿主机 Maven 仓库缓存以只读方式挂载。
    mount-m2: ${CODESTYLE_SANDBOX_DOCKER_MOUNT_M2:true}
    m2-host-path: ${CODESTYLE_SANDBOX_DOCKER_M2_HOST_PATH:${user.home}/.m2/repository}
    m2-container-path: ${CODESTYLE_SANDBOX_DOCKER_M2_CONTAINER_PATH:/var/maven/repository}
    # 在非 Windows 环境中，将容器用户映射为当前宿主机 uid:gid。
    map-host-user: ${CODESTYLE_SANDBOX_DOCKER_MAP_HOST_USER:true}
    # Docker 不可用或初始化失败时，自动回退到本地模式。
    fallback-local: ${CODESTYLE_SANDBOX_DOCKER_FALLBACK_LOCAL:true}

# 项目骨架解析与图构建（AstParsingService, DependencyGraphBuilder）
# 工具组: all（默认）= 全部工具; analyze = analyzeProject + exploreCodeContext（2工具）
#   fast-analysis = 仅 analyzeProject; explore = 仅 exploreCodeContext
#   code-analysis = 仅 extractProjectSkeleton; template = 模板7工具
codestyle:
  tool-group: ${CODESTYLE_TOOL_GROUP:all}
  skeleton:
    max-file-size-bytes: ${CODESTYLE_SKELETON_MAX_FILE_SIZE:1048576}
    max-files-per-project: ${CODESTYLE_SKELETON_MAX_FILES:5000}
    max-directory-depth: ${CODESTYLE_SKELETON_MAX_DEPTH:15}
  scoring:
    alpha: ${CODESTYLE_SCORING_ALPHA:0.45}
    beta: ${CODESTYLE_SCORING_BETA:0.25}
    gamma: ${CODESTYLE_SCORING_GAMMA:0.15}
    delta: ${CODESTYLE_SCORING_DELTA:0.15}
  cache:
    skeleton-ttl-ms: ${CODESTYLE_CACHE_SKELETON_TTL:3600000}

# 仓库配置。
repository:
  # Windows 上 "~" 不会被自动展开，可能导致生成名为 "~" 的目录。
  # 用相对路径默认落在项目根目录下，且仍可通过环境变量 CODESTYLE_CACHE_PATH 覆盖。
  local-path: ${CODESTYLE_CACHE_PATH:./.codestyle/cache}
  remote:
    enabled: ${CODESTYLE_REMOTE_ENABLED:false}
    base-url: ${repository.remote.base-url:http://localhost:8000}
    access-key: ${repository.remote.access-key:}
    secret-key: ${repository.remote.secret-key:}
    timeout-ms: ${repository.remote.timeout-ms:10000}
